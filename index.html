<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050508">
  <title>GeoHunter RPG</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Root ─────────────────────────────────── */
    :root {
      --gold:     #e8a020;
      --gold-dim: #a06010;
      --red:      #c02830;
      --red-hi:   #e84040;
      --green:    #20a060;
      --bg-deep:  #050508;
      --bg-card:  #0e0e1c;
      --border:   #1c1c2e;
      --text:     #d0d0e8;
      --muted:    #505068;
      --display:  'Cinzel', serif;
      --body:     'Barlow Condensed', system-ui, sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow:hidden; font-family:var(--body); background:var(--bg-deep); color:var(--text); }

    /* ── Loading Screen ───────────────────────────────── */
    #loading {
      position:fixed; inset:0; z-index:2000;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      background:radial-gradient(ellipse at 30% 35%, #130820 0%, #050508 65%);
      transition:opacity 0.6s;
    }
    .load-glyph   { font-size:3.8rem; animation:glyph-spin 5s linear infinite; }
    @keyframes glyph-spin { to { filter:hue-rotate(360deg); } }

    .load-title   {
      font-family:var(--display); font-size:2.8rem; font-weight:900; letter-spacing:7px;
      background:linear-gradient(135deg, #e8a020 0%, #ff5820 50%, #e8a020 100%);
      background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:title-shimmer 2.4s linear infinite;
    }
    @keyframes title-shimmer { 0%{background-position:100%} 100%{background-position:-100%} }

    .load-tagline { font-size:0.72rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
    .load-bar-bg  { width:190px; height:3px; background:#151520; border-radius:3px; overflow:hidden; }
    .load-bar     { height:100%; background:linear-gradient(90deg,var(--gold),#ff5820); animation:lbar 2.8s ease infinite; }
    @keyframes lbar { 0%{width:0%} 75%{width:100%} 100%{width:100%} }
    #load-msg     { font-size:0.72rem; color:var(--muted); letter-spacing:1px; }

    /* ── Map ──────────────────────────────────────────── */
    #map { position:fixed; inset:0; z-index:1; }

    /* ── Player dot ───────────────────────────────────── */
    .player-dot {
      width:20px; height:20px; border-radius:50%;
      background:#55ccff; border:3px solid #fff;
      box-shadow:0 0 0 6px rgba(85,200,255,.25), 0 0 20px rgba(85,200,255,.7);
      animation:pdot 2.4s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100%{box-shadow:0 0 0 6px rgba(85,200,255,.25),0 0 20px rgba(85,200,255,.7)}
      50%    {box-shadow:0 0 0 14px rgba(85,200,255,.08),0 0 30px rgba(85,200,255,.9)}
    }

    /* ── Monster markers ──────────────────────────────── */
    .mon-marker {
      display:flex; flex-direction:column; align-items:center; cursor:pointer;
      animation:mon-float 3s ease-in-out infinite;
    }
    @keyframes mon-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .mon-m-emoji { font-size:2rem; filter:drop-shadow(0 0 6px rgba(255,60,60,.75)); line-height:1; }
    .mon-m-tag   {
      font-size:0.52rem; font-weight:700; white-space:nowrap;
      background:rgba(0,0,0,.82); color:#ff9090; border:1px solid rgba(255,60,60,.4);
      padding:1px 5px; border-radius:4px; margin-top:2px;
    }

    /* ── HUD Top ──────────────────────────────────────── */
    #hud-top {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:10px 13px;
      background:linear-gradient(to bottom, rgba(5,5,8,.93) 55%, transparent);
      pointer-events:none;
    }
    .hud-row         { display:flex; align-items:center; gap:10px; }
    .hud-hp-col      { flex:1; display:flex; flex-direction:column; gap:3px; }
    .hud-hp-lbl      { font-size:0.58rem; letter-spacing:2px; color:var(--muted); font-family:var(--display); }
    .hud-hp-track    { height:13px; background:#0a0a14; border-radius:7px; overflow:hidden; border:1px solid #181828; }
    #hud-hpbar       { height:100%; border-radius:7px; transition:width .4s ease, background .4s ease; }
    .hud-hp-num      { font-size:0.65rem; color:var(--muted); text-align:right; }
    .hud-right       { display:flex; flex-direction:column; gap:4px; align-items:flex-end; pointer-events:all; }
    .gold-chip       {
      display:flex; align-items:center; gap:5px;
      background:rgba(232,160,32,.1); border:1px solid rgba(232,160,32,.4);
      border-radius:20px; padding:3px 11px;
    }
    .gold-chip span  { font-size:0.88rem; font-weight:700; color:var(--gold); font-family:var(--display); }
    #hud-env         { font-size:0.58rem; letter-spacing:1px; color:var(--muted); background:rgba(0,0,0,.5); border:1px solid var(--border); border-radius:10px; padding:3px 9px; }

    /* ── HUD Bottom ───────────────────────────────────── */
    #hud-bot {
      position:fixed; bottom:0; left:0; right:0; z-index:10;
      padding:0 14px 20px;
      display:flex; align-items:flex-end; justify-content:space-between;
      background:linear-gradient(to top, rgba(5,5,8,.93) 50%, transparent);
      pointer-events:none;
    }

    /* Joystick */
    #joy-pad {
      width:110px; height:110px; border-radius:50%; position:relative;
      background:rgba(10,10,24,.75); border:2px solid rgba(255,255,255,.12);
      box-shadow:inset 0 2px 10px rgba(0,0,0,.5), 0 0 20px rgba(85,200,255,.07);
      cursor:pointer; touch-action:none; pointer-events:all;
      transition:border-color .2s;
    }
    #joy-pad.active { border-color:rgba(85,200,255,.45); box-shadow:inset 0 2px 10px rgba(0,0,0,.5),0 0 24px rgba(85,200,255,.2); }
    #joy-knob {
      position:absolute; top:50%; left:50%;
      width:44px; height:44px; border-radius:50%; margin:-22px 0 0 -22px;
      background:radial-gradient(circle at 40% 35%, rgba(255,255,255,.35), rgba(120,180,255,.12));
      border:2px solid rgba(255,255,255,.3);
      box-shadow:0 2px 10px rgba(0,0,0,.6);
      pointer-events:none;
    }

    /* Action buttons */
    .hud-actions { display:flex; flex-direction:column; gap:7px; pointer-events:all; }
    .act-btn {
      display:flex; align-items:center; gap:7px;
      background:rgba(10,10,22,.88); border:1px solid var(--border);
      border-radius:12px; padding:9px 14px; cursor:pointer; min-width:80px;
      transition:all .15s; user-select:none;
    }
    .act-btn:active { transform:scale(.94); border-color:#2a2a44; background:rgba(20,20,38,.9); }
    .act-btn .ic   { font-size:1.15rem; }
    .act-btn .lb   { font-size:0.65rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

    /* ── Battle Screen ────────────────────────────────── */
    #battle {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      background:radial-gradient(ellipse at 50% 25%, #1a0828 0%, #050508 70%);
      transform:translateY(100%);
      transition:transform .45s cubic-bezier(.22,1,.36,1);
    }
    #battle.open { transform:translateY(0); }

    .b-header {
      padding:14px 16px 10px; text-align:center;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    #b-env-tag  { font-size:0.6rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    #b-title    { font-family:var(--display); font-size:1.35rem; font-weight:900; color:#ff9090; }

    .b-arena {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:16px 22px; gap:16px; position:relative; overflow:hidden;
    }
    .b-arena::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 50% 38%, rgba(192,40,48,.09) 0%, transparent 60%);
    }

    .mon-stage    { display:flex; flex-direction:column; align-items:center; gap:6px; }
    #b-emoji      { font-size:5.8rem; line-height:1; animation:b-float 2s ease-in-out infinite; }
    @keyframes b-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    #b-emoji.mon-hit { animation:b-hit .38s ease !important; }
    @keyframes b-hit  {
      0%  {transform:scale(1)    rotate(0);   filter:brightness(1)}
      25% {transform:scale(1.3)  rotate(-7deg);filter:brightness(5) saturate(0)}
      65% {transform:scale(.88) rotate(5deg); filter:brightness(1.5)}
      100%{transform:scale(1)    rotate(0);   filter:brightness(1)}
    }
    .mon-shadow {
      width:60px; height:10px; background:rgba(0,0,0,.5); border-radius:50%;
      filter:blur(4px); margin-top:-8px;
      animation:mshad 2s ease-in-out infinite;
    }
    @keyframes mshad { 0%,100%{transform:scaleX(1);opacity:.5} 50%{transform:scaleX(.55);opacity:.18} }
    #b-mname      { font-family:var(--display); font-size:1.15rem; font-weight:700; }
    #b-mlvl       { font-size:0.7rem; color:var(--muted); letter-spacing:1px; }

    .b-bars-block  { width:100%; max-width:340px; display:flex; flex-direction:column; gap:10px; }
    .bar-group     { display:flex; flex-direction:column; gap:3px; }
    .bar-lbl-row   { display:flex; justify-content:space-between; font-size:0.66rem; }
    .bar-lbl-row .bn { color:var(--muted); }
    .bar-lbl-row .bv { font-weight:700; }
    .bar-track     { height:14px; background:#0a0a14; border-radius:7px; overflow:hidden; border:1px solid #141424; }
    .bar-fill      { height:100%; border-radius:7px; transition:width .4s ease; }
    .bar-fill.enemy{ background:linear-gradient(90deg,#5010a0,#9050e0); }
    .bar-fill.hero { background:linear-gradient(90deg,#a01020,#e84040); }

    .b-player-row  { display:flex; align-items:center; gap:10px; }
    .player-ico    { font-size:2.5rem; }
    .b-player-mini { display:flex; flex-direction:column; gap:2px; }
    .b-player-mini span { font-size:0.74rem; color:var(--muted); }

    .b-actions    { padding:16px; display:flex; flex-direction:column; gap:8px; }

    #atk-btn {
      background:linear-gradient(135deg,#8a1820,#c0282e);
      border:none; border-radius:18px; padding:20px 16px;
      color:#fff; font-family:var(--display); font-size:1.3rem; font-weight:900; letter-spacing:4px;
      cursor:pointer; position:relative; overflow:hidden;
      box-shadow:0 6px 24px rgba(192,40,48,.45), inset 0 1px 0 rgba(255,255,255,.1);
      transition:all .12s; user-select:none;
    }
    #atk-btn::before {
      content:''; position:absolute; top:0; left:-100%; width:55%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
      animation:sword-shine 2.6s ease infinite;
    }
    @keyframes sword-shine { 0%{left:-100%} 50%,100%{left:200%} }
    #atk-btn:active:not(:disabled) { transform:scale(.96); box-shadow:0 3px 12px rgba(192,40,48,.3); }
    #atk-btn:disabled { opacity:.4; cursor:not-allowed; }
    #cd-bar  { position:absolute; bottom:0; left:0; height:4px; background:rgba(255,255,255,.4); border-radius:0 0 18px 18px; }

    #flee-btn {
      background:transparent; border:1px solid #1e1e34; border-radius:12px;
      padding:11px; color:var(--muted); font-family:var(--body); font-size:0.88rem;
      letter-spacing:1px; cursor:pointer; transition:all .2s;
    }
    #flee-btn:active { background:rgba(255,255,255,.04); }

    /* ── Damage Floats ────────────────────────────────── */
    .dmg-float {
      position:fixed; font-family:var(--display); font-size:1.8rem; font-weight:900;
      pointer-events:none; z-index:500;
      animation:dmg-rise 1.1s ease forwards;
    }
    @keyframes dmg-rise {
      0%   { opacity:1; transform:translateY(0)   scale(1) }
      40%  { opacity:1; transform:translateY(-38px) scale(1.25) }
      100% { opacity:0; transform:translateY(-85px) scale(.7) }
    }
    .dmg-yellow { color:#ffe060; text-shadow:0 0 12px rgba(255,200,0,.8); }
    .dmg-red    { color:#ff4444; text-shadow:0 0 12px rgba(255,0,0,.8); }

    /* Screen flash */
    .screen-flash {
      position:fixed; inset:0; z-index:998; pointer-events:none;
      animation:sflash .3s ease forwards;
    }
    @keyframes sflash { 0%{background:rgba(255,0,0,.28)} 100%{background:transparent} }

    /* ── Loot Screen ──────────────────────────────────── */
    #loot {
      position:fixed; inset:0; z-index:200;
      background:rgba(2,2,10,.95);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; padding:32px 24px;
    }
    #loot.open { display:flex; }
    .loot-trophy { font-size:3.2rem; animation:trophy-pop .6s ease; }
    @keyframes trophy-pop { 0%{transform:scale(0) rotate(-20deg)} 70%{transform:scale(1.25) rotate(5deg)} 100%{transform:scale(1)} }
    .loot-title  { font-family:var(--display); font-size:2.1rem; font-weight:900; color:var(--gold); letter-spacing:3px; }
    #loot-sub    { font-size:0.85rem; color:var(--muted); }
    #loot-list   { display:flex; flex-direction:column; gap:8px; width:100%; max-width:295px; }
    .loot-row    {
      display:flex; align-items:center; gap:13px;
      background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:14px; padding:12px; animation:loot-pop .4s ease;
    }
    @keyframes loot-pop { 0%{transform:scale(.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    .loot-ic     { font-size:1.7rem; }
    .loot-name   { font-size:0.85rem; font-weight:700; }
    .loot-stat   { font-size:0.7rem; color:var(--gold); margin-top:2px; }
    #collect-btn {
      background:linear-gradient(135deg,var(--gold-dim),var(--gold));
      border:none; border-radius:16px; padding:16px 44px;
      color:#000; font-family:var(--display); font-size:1rem; font-weight:900; letter-spacing:2px;
      cursor:pointer; box-shadow:0 4px 20px rgba(232,160,32,.4);
      transition:transform .15s;
    }
    #collect-btn:active { transform:scale(.96); }

    /* ── Panel base ───────────────────────────────────── */
    .panel {
      position:fixed; inset:0; z-index:150;
      background:rgba(3,3,12,.97);
      display:none; flex-direction:column;
    }
    .panel.open { display:flex; }
    .panel-hd   {
      padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border);
      background:linear-gradient(to right, rgba(232,160,32,.05), transparent);
    }
    .panel-title { font-family:var(--display); font-size:1.2rem; font-weight:700; }
    .close-btn   {
      background:transparent; border:1px solid var(--border); border-radius:8px;
      padding:5px 12px; color:var(--muted); cursor:pointer; font-size:0.85rem;
      font-family:var(--body); transition:all .2s;
    }
    .close-btn:active { background:rgba(255,255,255,.04); }

    /* ── Shop ─────────────────────────────────────────── */
    #shop-grid {
      flex:1; overflow-y:auto; padding:12px;
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
    }
    .shop-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
      padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:5px;
      cursor:pointer; transition:all .15s; position:relative;
    }
    .shop-card:active       { transform:scale(.95); border-color:#282840; }
    .shop-card.equipped     { border-color:var(--gold); background:rgba(232,160,32,.06); }
    .shop-card.cant-afford  { opacity:.5; }
    .eq-badge               {
      position:absolute; top:6px; right:6px;
      font-size:0.5rem; font-weight:700; background:var(--gold); color:#000;
      padding:1px 5px; border-radius:5px;
    }
    .si-icon { font-size:2.1rem; }
    .si-name { font-size:0.8rem; font-weight:700; text-align:center; line-height:1.2; }
    .si-desc { font-size:0.65rem; color:var(--muted); text-align:center; }
    .si-cost { font-size:0.83rem; font-weight:700; }

    /* ── Stats ────────────────────────────────────────── */
    #stats-body        { flex:1; overflow-y:auto; padding:13px; display:flex; flex-direction:column; gap:9px; }
    .stat-card         { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .stat-section-title{ font-family:var(--display); font-size:0.6rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:9px; }
    .st-row            { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04); }
    .st-row:last-child { border:none; }
    .st-l              { font-size:0.83rem; color:var(--muted); }
    .st-v              { font-size:0.83rem; font-weight:700; }
    .st-v small        { color:var(--muted); font-weight:400; }
    .gold-txt          { color:var(--gold); }
    .eq-row            { display:flex; align-items:center; gap:11px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); }
    .eq-row:last-child { border:none; }
    .eq-ic             { font-size:1.5rem; }
    .eq-nm             { font-size:0.8rem; font-weight:600; }
    .eq-st             { font-size:0.68rem; color:var(--gold); margin-top:1px; }

    /* ── Toast ────────────────────────────────────────── */
    #toast {
      position:fixed; bottom:92px; left:50%; transform:translateX(-50%);
      background:rgba(10,10,22,.96); border:1px solid var(--border); border-radius:12px;
      padding:9px 18px; font-size:0.83rem; z-index:600; white-space:nowrap;
      opacity:0; transition:opacity .25s; pointer-events:none;
    }
    #toast.show { opacity:1; }

    /* ── Leaflet overrides ────────────────────────────── */
    .leaflet-container { background:#0a0a10; }
  </style>
</head>
<body>

  <!-- ── Loading ─────────────────────────────────── -->
  <div id="loading">
    <div class="load-glyph">🌀</div>
    <div class="load-title">GEOHUNTER</div>
    <div class="load-tagline">Real World · Real Monsters</div>
    <div class="load-bar-bg"><div class="load-bar"></div></div>
    <div id="load-msg">Locating you...</div>
  </div>

  <!-- ── Map ─────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── HUD Top ─────────────────────────────────── -->
  <div id="hud-top">
    <div class="hud-row">
      <div class="hud-hp-col">
        <div class="hud-hp-lbl">⚔ HERO HP</div>
        <div class="hud-hp-track"><div id="hud-hpbar" style="width:100%"></div></div>
        <div class="hud-hp-num" id="hud-hpnum">100 / 100</div>
      </div>
      <div class="hud-right">
        <div class="gold-chip">💰 <span id="hud-gold">0</span></div>
        <div id="hud-env">🏙️ Urban</div>
      </div>
    </div>
  </div>

  <!-- ── HUD Bottom ──────────────────────────────── -->
  <div id="hud-bot">

    <!-- Joystick -->
    <div id="joy-pad">
      <div id="joy-knob"></div>
    </div>

    <!-- Action buttons -->
    <div class="hud-actions">
      <div class="act-btn" onclick="openShop()">
        <div class="ic">🏪</div><div class="lb">Shop</div>
      </div>
      <div class="act-btn" onclick="openStats()">
        <div class="ic">⚔️</div><div class="lb">Hero</div>
      </div>
    </div>

  </div>

  <!-- ── Battle Screen ───────────────────────────── -->
  <div id="battle">
    <div class="b-header">
      <div id="b-env-tag">⚔ ENCOUNTER</div>
      <div id="b-title">MONSTER!</div>
    </div>
    <div class="b-arena">
      <div class="mon-stage">
        <div id="b-emoji">👹</div>
        <div class="mon-shadow"></div>
        <div id="b-mname">Monster</div>
        <div id="b-mlvl">Level 1</div>
      </div>
      <div class="b-bars-block">
        <div class="bar-group">
          <div class="bar-lbl-row">
            <span class="bn" id="b-mname-bar">Monster</span>
            <span class="bv" id="b-mhpv">50/50</span>
          </div>
          <div class="bar-track"><div class="bar-fill enemy" id="b-mhpbar" style="width:100%"></div></div>
        </div>
        <div class="bar-group">
          <div class="bar-lbl-row">
            <span class="bn">YOU</span>
            <span class="bv" id="b-phpv">100/100</span>
          </div>
          <div class="bar-track"><div class="bar-fill hero" id="b-phpbar" style="width:100%"></div></div>
        </div>
      </div>
      <div class="b-player-row">
        <div class="player-ico">🧙</div>
        <div class="b-player-mini">
          <span id="b-atk-stat">⚔ ATK: 8</span>
          <span id="b-def-stat">🛡 DEF: 2</span>
        </div>
      </div>
    </div>
    <div class="b-actions">
      <button id="atk-btn" onclick="playerAttack()">
        ⚔ ATTACK
        <div id="cd-bar" style="width:0%"></div>
      </button>
      <button id="flee-btn" onclick="playerFlee()">🏃 Flee from battle</button>
    </div>
  </div>

  <!-- ── Loot Screen ─────────────────────────────── -->
  <div id="loot">
    <div class="loot-trophy">🏆</div>
    <div class="loot-title">VICTORY!</div>
    <div id="loot-sub">Enemy defeated</div>
    <div id="loot-list"></div>
    <button id="collect-btn" onclick="collectLoot()">✨ COLLECT LOOT</button>
  </div>

  <!-- ── Shop Panel ──────────────────────────────── -->
  <div class="panel" id="shop-panel">
    <div class="panel-hd">
      <div>
        <div style="font-size:.58rem;color:var(--muted);letter-spacing:2px;margin-bottom:3px">TRAVELING MERCHANT</div>
        <div class="panel-title" style="color:var(--gold)">🏪 Black Market</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div style="font-size:.88rem;font-weight:700;color:var(--gold)">💰 <span id="shop-gold-display">0</span></div>
        <button class="close-btn" onclick="closeShop()">✕ Close</button>
      </div>
    </div>
    <div id="shop-grid"></div>
  </div>

  <!-- ── Stats Panel ─────────────────────────────── -->
  <div class="panel" id="stats-panel">
    <div class="panel-hd">
      <div class="panel-title">⚔️ Hero Stats</div>
      <button class="close-btn" onclick="closeStats()">✕ Close</button>
    </div>
    <div id="stats-body"></div>
  </div>

  <!-- ── Toast ───────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ── Scripts ─────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="data.js"></script>
  <script src="game.js"></script>

</body>
</html>
